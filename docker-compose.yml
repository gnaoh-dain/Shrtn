version: '3.8'
services:
  db:
    image: postgres:15
    ports:
      - 5432:5432
    restart: unless-stopped
    environment:
      POSTGRES_USER: shrtn
      POSTGRES_PASSWORD: supersecretkey123
      POSTGRES_DB: shrtn
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
